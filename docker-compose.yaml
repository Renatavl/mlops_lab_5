services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW_UID: "50000"
      PROJECT_DIR: /opt/airflow/project
      MLFLOW_TRACKING_URI: file:///opt/airflow/project/mlruns
      MLFLOW_MODEL_NAME: WeatherPredictionModel
      MLFLOW_TARGET_STAGE: Staging
      ACCURACY_THRESHOLD: "0.85"
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    entrypoint: >
      bash -c "airflow db migrate && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin || true"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    command: webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_UID: "50000"
      PROJECT_DIR: /opt/airflow/project
      MLFLOW_TRACKING_URI: file:///opt/airflow/project/mlruns
      MLFLOW_MODEL_NAME: WeatherPredictionModel
      MLFLOW_TARGET_STAGE: Staging
      ACCURACY_THRESHOLD: "0.85"
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW_UID: "50000"
      PROJECT_DIR: /opt/airflow/project
      MLFLOW_TRACKING_URI: file:///opt/airflow/project/mlruns
      MLFLOW_MODEL_NAME: WeatherPredictionModel
      MLFLOW_TARGET_STAGE: Staging
      ACCURACY_THRESHOLD: "0.85"
    volumes:
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-db-volume:
